<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 · Wiki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f5f5f4;
      color: #1c1917;
    }
    .card {
      width: 360px;
      max-width: calc(100vw - 32px);
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }
    h1 {
      font-size: 18px;
      margin: 0 0 6px 0;
      font-weight: 600;
    }
    .sub {
      color: #78716c;
      font-size: 13px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #44403c;
      margin-bottom: 6px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #d6d3d1;
      border-radius: 8px;
      outline: none;
      background: #fafaf9;
      transition: border-color 0.15s;
    }
    input:focus {
      border-color: #5B5BD6;
      background: #fff;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px 12px;
      font-size: 14px;
      background: #5B5BD6;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4949C4; }
    button:disabled { background: #a8a29e; cursor: not-allowed; }
    .error {
      margin-top: 12px;
      font-size: 13px;
      color: #b91c1c;
      min-height: 18px;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b91c1c;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>管理员登录</h1>
    <div class="sub">输入服务端 WIKI_ADMIN_TOKEN 后继续</div>
    <form id="loginForm">
      <label for="token">Token</label>
      <input id="token" type="password" autocomplete="current-password" autofocus>
      <button type="submit" id="submitBtn">登录</button>
      <div class="error" id="err"></div>
    </form>
  </div>
  <script>
    (function () {
      var form = document.getElementById('loginForm');
      var input = document.getElementById('token');
      var btn = document.getElementById('submitBtn');
      var errEl = document.getElementById('err');

      function showErr(msg) {
        errEl.innerHTML = '<span class="dot"></span>' + msg;
      }
      function clearErr() { errEl.textContent = ''; }

      form.addEventListener('submit', function (ev) {
        ev.preventDefault();
        clearErr();
        var token = input.value;
        if (!token) { showErr('请输入 token'); return; }
        btn.disabled = true;
        btn.textContent = '登录中...';
        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token })
        }).then(function (r) {
          return r.json().then(function (data) { return { status: r.status, data: data }; });
        }).then(function (resp) {
          btn.disabled = false;
          btn.textContent = '登录';
          if (resp.status === 200 && resp.data && resp.data.ok) {
            location.href = '/';
            return;
          }
          showErr((resp.data && resp.data.error) || '登录失败');
        }).catch(function (e) {
          btn.disabled = false;
          btn.textContent = '登录';
          showErr('网络错误');
        });
      });
    })();
  </script>
</body>
</html>
