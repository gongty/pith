<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">
<link rel="stylesheet" href="/css/ingest.css">
</head>
<body>
<div class="app">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-resize" id="sidebarResize"></div>
  <div class="sidebar-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    知识库
    <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="收起侧边栏">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
    </button>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-item" data-view="dashboard" onclick="go('#/')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      首页
    </div>
    <div class="sidebar-item" data-view="graph" onclick="go('#/graph')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><circle cx="18" cy="6" r="3"/><line x1="8.5" y1="7.5" x2="15.5" y2="16.5"/><line x1="15.5" y1="7.5" x2="8.5" y2="16.5"/></svg>
      知识图谱
    </div>
    <div class="sidebar-item" data-view="browse" onclick="go('#/browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      全部文章
    </div>
  </nav>

  <!-- Sidebar tabs -->
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="chat" onclick="switchSidebarTab('chat')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      对话
    </button>
    <button class="sidebar-tab" data-tab="pages" onclick="switchSidebarTab('pages')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      文章
    </button>
  </div>

  <!-- Chat panel -->
  <div class="sidebar-panel" id="sidebarPanelChat">
    <button class="sidebar-new-chat-btn" onclick="go('#/chat')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新对话
    </button>
    <div class="sidebar-chat-list" id="sidebarChats"></div>
  </div>

  <!-- Pages panel -->
  <div class="sidebar-panel" id="sidebarPanelPages" style="display:none">
    <div class="sidebar-pages" id="sidebarPages"></div>
  </div>

  <div class="sidebar-bottom">
    <button class="sidebar-bottom-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      设置
    </button>
    <button class="sidebar-bottom-btn" onclick="toggleTheme()">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      主题
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <button class="sidebar-expand-btn" id="sidebarExpandBtn" onclick="toggleSidebar()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
  </button>
  <div class="topbar" id="topbar">
    <div class="topbar-breadcrumb" id="breadcrumb"></div>
    <div class="topbar-actions" id="topbarActions">
      <button class="topbar-btn" onclick="openSearch()" title="⌘K"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>搜索</button>
      <button class="topbar-btn topbar-btn-accent" onclick="openIngest()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>投喂</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- Format toolbar -->
<div class="format-toolbar" id="formatToolbar">
  <button class="format-toolbar-btn" onclick="fmtCmd('bold')" title="加粗"><b>B</b></button>
  <button class="format-toolbar-btn" onclick="fmtCmd('italic')" title="斜体"><i>I</i></button>
  <button class="format-toolbar-btn" onclick="fmtCmd('code')" title="代码"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
  <div class="format-toolbar-sep"></div>
  <button class="format-toolbar-btn" onclick="fmtCmd('link')" title="链接"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>
  <div class="format-toolbar-sep"></div>
  <button class="format-toolbar-btn" onclick="fmtCmd('h2')" title="H2" style="font-size:11px">H2</button>
  <button class="format-toolbar-btn" onclick="fmtCmd('h3')" title="H3" style="font-size:11px">H3</button>
</div>

<!-- Search -->
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-box">
    <div class="search-input-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-field" id="searchInput" placeholder="搜索或提问..." autocomplete="off">
      <span class="search-hint">ESC</span>
    </div>
    <div class="search-results" id="searchResults"><div class="search-empty-msg">输入关键词搜索</div></div>
  </div>
</div>

<!-- Ingest -->
<div class="ingest-overlay" id="ingestOverlay" onclick="if(event.target===this)closeIngest()">
  <div class="ingest-panel">
    <div class="ingest-head"><h3>投喂知识</h3><button class="topbar-btn" onclick="closeIngest()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="ingest-form">
      <div>
        <label class="field-label">拖拽文件或粘贴内容 · 支持 PDF/图片/音视频/文本/链接</label>
        <div class="ingest-drop-zone" id="ingestDropZone">
          <textarea id="ingestContent" placeholder="粘贴文本、拖入文件、或输入 https:// 链接..."></textarea>
          <div class="ingest-upload-bar">
            <input type="file" id="ingestFile" accept=".txt,.md,.html,.json,.csv,.xml,.zip,.pdf,.png,.jpg,.jpeg,.webp,.gif,.mp3,.mp4,.wav,.m4a,.ogg,.webm" multiple hidden>
            <button class="ingest-upload-btn" onclick="document.getElementById('ingestFile').click()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              上传文件
            </button>
            <span class="ingest-file-name" id="ingestFileName"></span>
          </div>
          <div class="ingest-drop-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            释放文件
          </div>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <div style="flex:1"><label class="field-label">主题</label><select class="field-select" id="ingestTopic"><option value="auto">自动分类</option></select></div>
        <div style="flex:1"><label class="field-label">模型</label><select class="field-select" id="ingestModel"></select></div>
      </div>
      <div id="ingestBatchPreview" style="display:none">
        <div class="ingest-batch-summary" id="ingestBatchSummary"></div>
        <div class="ingest-batch-actions"><button onclick="batchToggleAll(true)">全选</button><button onclick="batchToggleAll(false)">取消全选</button></div>
        <div class="ingest-batch-list" id="ingestBatchList"></div>
      </div>
      <button class="btn-fill" id="ingestBtn" onclick="submitIngest()">开始编译</button>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="modal-bg" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-card modal-card-tabs">
    <div class="modal-top"><h3>设置</h3><button onclick="closeSettings()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="settings-tabs">
      <button class="settings-tab active" data-tab="provider" onclick="switchSettingsTab('provider')">模型配置</button>
      <button class="settings-tab" data-tab="memory" onclick="switchSettingsTab('memory')">记忆</button>
    </div>
    <div class="settings-tab-content" id="settingsTabProvider">
      <div class="modal-form">
        <div><label class="field-label">提供商</label><select class="field-select" id="sProv" onchange="onProvChange()"></select></div>
        <div><label class="field-label">API Key</label><input class="field-input" type="password" id="sKey" placeholder="输入 API Key..."></div>
        <div><label class="field-label">模型</label><select class="field-select" id="sModel"></select></div>
      </div>
      <div class="modal-foot">
        <button class="btn-outline" onclick="testConn()">测试连接</button>
        <button class="btn-sm-fill" onclick="saveSett()">保存</button>
      </div>
    </div>
    <div class="settings-tab-content" id="settingsTabMemory" style="display:none"></div>
  </div>
</div>

<!-- Delete confirm -->
<div class="confirm-bg" id="delConfirm" onclick="if(event.target===this)closeDel()">
  <div class="confirm-card">
    <h3>确认删除</h3><p>删除后无法恢复</p>
    <div class="confirm-btns"><button class="btn-cancel" onclick="closeDel()">取消</button><button class="btn-delete" onclick="doDel()">删除</button></div>
  </div>
</div>

<!-- Ingest progress toast -->
<div class="ingest-toast" id="ingestToast">
  <div class="ingest-toast-row"><span class="ingest-toast-title" id="itTitle"></span><span class="ingest-toast-detail" id="itDetail"></span></div>
  <div class="ingest-toast-bar"><div class="ingest-toast-fill" id="itFill"></div></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Sidebar preview tooltip -->
<div class="sidebar-preview" id="sidebarPreview">
  <div class="sidebar-preview-title" id="spTitle"></div>
  <div class="sidebar-preview-summary" id="spSummary"></div>
  <div class="sidebar-preview-time" id="spTime"></div>
</div>


<!-- Mobile bottom nav -->
<div class="mobile-nav" id="mobileNav">
  <div class="mobile-nav-inner">
    <div class="mobile-nav-item" data-view="dashboard" onclick="go('#/')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
    </div>
    <div class="mobile-nav-item" data-view="chat" onclick="go('#/chat')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>对话
    </div>
    <div class="mobile-nav-item" data-view="browse" onclick="go('#/browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>文章
    </div>
    <div class="mobile-nav-item" onclick="openIngest()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>投喂
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
