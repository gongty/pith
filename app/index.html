<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库</title>
<style>
/* ── Notion-inspired tokens ── */
:root {
  --fg: #1a1a1a;
  --fg-secondary: rgba(25,25,25,0.6);
  --fg-tertiary: rgba(25,25,25,0.4);
  --bg: #FFFFFF;
  --bg-sidebar: #F8F9FA;
  --bg-hover: rgba(0,0,0,0.03);
  --bg-active: rgba(0,0,0,0.06);
  --border: rgba(0,0,0,0.08);
  --accent: #2383E2;
  --accent-bg: rgba(35,131,226,0.07);
  --radius: 6px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Noto Sans SC", "PingFang SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, "Cascadia Code", "Fira Code", Menlo, Consolas, monospace;
  --sidebar-w: 240px;
  --content-w: 720px;
  --green: #448361;
  --red: #EB5757;
  --orange: #D9730D;
  --yellow: #DFAB01;
  --blue: #2383E2;
  --purple: #9065B0;
  --pink: #C14C8A;
  --brown: #64473A;
  --t: 150ms ease;
}
[data-theme="dark"] {
  --fg: rgba(255,255,255,0.92);
  --fg-secondary: rgba(255,255,255,0.58);
  --fg-tertiary: rgba(255,255,255,0.38);
  --bg: #191919;
  --bg-sidebar: #1e1e1e;
  --bg-hover: rgba(255,255,255,0.05);
  --bg-active: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.09);
  --accent: #529CDB;
  --accent-bg: rgba(82,156,219,0.12);
  --green: #4DAB9A;
  --red: #FF7369;
  --orange: #FFA344;
}

/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font);color:var(--fg);background:var(--bg);line-height:1.5;overflow:hidden;height:100vh}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;color:var(--fg);background:var(--bg);outline:none;border:none}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:transparent;border-radius:20px}
::-webkit-scrollbar-thumb:hover{background:var(--fg-tertiary)}
*:hover>::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}

/* ── Layout ── */
.app{display:flex;height:100vh}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);background:var(--bg-sidebar);
  display:flex;flex-direction:column;flex-shrink:0;
  overflow:hidden;position:relative;transition:width 200ms ease;
  border-right:1px solid var(--border);
}
.sidebar.collapsed{width:0;overflow:hidden;border-right:none}
.sidebar-resize{
  position:absolute;top:0;right:0;width:4px;height:100%;cursor:col-resize;z-index:10;
  transition:background var(--t);
}
.sidebar-resize:hover,.sidebar-resize.dragging{background:var(--accent);opacity:0.4}
.sidebar-header{
  display:flex;align-items:center;gap:8px;padding:12px 14px 10px;
  font-size:14px;font-weight:700;letter-spacing:-0.02em;color:var(--fg);
}
.sidebar-header svg{flex-shrink:0;color:var(--accent)}
.sidebar-header .sidebar-collapse-btn{
  margin-left:auto;width:24px;height:24px;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  color:var(--fg-tertiary);transition:background var(--t),color var(--t);opacity:0;
}
.sidebar:hover .sidebar-collapse-btn{opacity:1}
.sidebar-collapse-btn:hover{background:var(--bg-hover);color:var(--fg-secondary)}
.sidebar-expand-btn{
  position:fixed;top:10px;left:8px;z-index:15;width:28px;height:28px;
  border-radius:var(--radius);display:none;align-items:center;justify-content:center;
  color:var(--fg-tertiary);transition:background var(--t),color var(--t);
}
.sidebar-expand-btn:hover{background:var(--bg-hover);color:var(--fg-secondary)}
.sidebar.collapsed ~ .main .sidebar-expand-btn{display:flex}

.sidebar-nav{padding:4px 8px 0}
.sidebar-item{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  border-radius:6px;font-size:13.5px;color:var(--fg-secondary);
  cursor:pointer;transition:all var(--t);user-select:none;font-weight:500;
}
.sidebar-item:hover{background:var(--bg-hover);color:var(--fg)}
.sidebar-item.active{background:var(--accent-bg);color:var(--accent)}
.sidebar-item svg{width:17px;height:17px;flex-shrink:0;opacity:0.55}
.sidebar-item:hover svg{opacity:0.8}
.sidebar-item.active svg{opacity:1;color:var(--accent)}
.sidebar-section{
  font-size:11px;font-weight:600;color:var(--fg-tertiary);
  padding:18px 14px 6px;text-transform:uppercase;letter-spacing:0.05em;
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-section-btn{
  width:20px;height:20px;border-radius:var(--radius);display:flex;
  align-items:center;justify-content:center;color:var(--fg-tertiary);
  transition:background var(--t),color var(--t);opacity:0;
}
.sidebar-section:hover .sidebar-section-btn{opacity:1}
.sidebar-section-btn:hover{background:var(--accent-bg);color:var(--accent)}
.sidebar-pages{flex:1;overflow-y:auto;padding:2px 8px 16px}
.sidebar-page{
  display:flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;
  border-radius:6px;font-size:13px;color:var(--fg-secondary);
  cursor:pointer;transition:all var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  border-left:2px solid transparent;margin-left:2px;
}
.sidebar-page:hover{background:var(--bg-hover);color:var(--fg)}
.sidebar-page.active{background:var(--accent-bg);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.sidebar-page svg{width:15px;height:15px;flex-shrink:0;opacity:0.4}
.sidebar-page.active svg{opacity:0.7;color:var(--accent)}
.sidebar-page .page-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sidebar-topic{
  padding:8px 14px 3px;font-size:11.5px;font-weight:600;color:var(--fg-tertiary);
  display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;
  letter-spacing:0.02em;
}
.sidebar-topic:hover{color:var(--fg-secondary)}
.sidebar-topic .fold-arrow{
  width:12px;height:12px;transition:transform 150ms ease;display:inline-flex;
  align-items:center;justify-content:center;font-size:9px;
}
.sidebar-topic.folded .fold-arrow{transform:rotate(-90deg)}
.sidebar-topic.folded ~ .sidebar-page[data-topic]{display:none}

/* Chat list in sidebar */
.sidebar-chat-list{padding:0 8px 4px}
.sidebar-chat-item{
  display:flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;
  border-radius:6px;font-size:13px;color:var(--fg-secondary);
  cursor:pointer;transition:all var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sidebar-chat-item:hover{background:var(--bg-hover);color:var(--fg)}
.sidebar-chat-item.active{background:var(--accent-bg);color:var(--accent)}
.sidebar-chat-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.35}
.sidebar-chat-item.active svg{opacity:0.7;color:var(--accent)}
.sidebar-chat-item .chat-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

.sidebar-bottom{
  padding:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:1px;
}
.sidebar-bottom-btn{
  display:flex;align-items:center;gap:8px;
  padding:5px 10px;border-radius:6px;font-size:13px;color:var(--fg-secondary);
  transition:background var(--t);
}
.sidebar-bottom-btn:hover{background:var(--bg-hover)}
.sidebar-bottom-btn svg{width:16px;height:16px;opacity:0.4;flex-shrink:0}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* ── Topbar ── */
.topbar{
  height:44px;min-height:44px;display:flex;align-items:center;
  padding:0 16px;gap:8px;font-size:13px;color:var(--fg-secondary);
  border-bottom:1px solid var(--border);
}
.topbar-breadcrumb{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-breadcrumb a{color:var(--fg-tertiary);transition:color var(--t)}
.topbar-breadcrumb a:hover{color:var(--fg)}
.topbar-breadcrumb .sep{margin:0 4px;color:var(--fg-tertiary)}
.topbar-actions{display:flex;gap:2px;align-items:center}
.topbar-btn{
  height:28px;padding:0 8px;border-radius:var(--radius);font-size:13px;
  color:var(--fg-secondary);display:flex;align-items:center;gap:4px;
  transition:background var(--t);
}
.topbar-btn:hover{background:var(--bg-hover)}
.topbar-btn svg{width:15px;height:15px}
.topbar-btn-accent{color:#fff;background:var(--accent);border-radius:6px;font-weight:500;padding:0 12px}
.topbar-btn-accent:hover{background:#1a73d4;opacity:1}
.topbar-btn-accent svg{color:#fff}
#topbarDel:hover{color:var(--red)!important}

/* ── Content ── */
.content{flex:1;overflow-y:auto}

/* ── Skeleton ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{border-radius:var(--radius);background:linear-gradient(90deg,var(--bg-hover) 25%,var(--bg-active) 50%,var(--bg-hover) 75%);background-size:800px 100%;animation:shimmer 1.5s infinite}
.skel-line{height:14px;margin-bottom:10px;border-radius:3px}
.skel-title{height:28px;width:40%;margin-bottom:16px}
.skel-block{height:80px;margin-bottom:16px}
.skel-circle{width:24px;height:24px;border-radius:50%}

/* ── Page: Dashboard ── */
.page-dashboard{max-width:var(--content-w);margin:0 auto;padding:40px 48px 120px;animation:fadeIn 150ms ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* Chat area (dashboard) */
.chat-area{margin-bottom:48px}
.chat-greeting{font-size:30px;font-weight:700;letter-spacing:-0.03em;margin-bottom:6px;text-align:center;padding-top:32px;background:linear-gradient(135deg,var(--fg) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.chat-sub{font-size:14px;color:var(--fg-tertiary);text-align:center;margin-bottom:24px}
.chat-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.chat-pill{
  padding:7px 16px;border-radius:20px;font-size:13px;
  color:var(--accent);background:var(--accent-bg);
  cursor:pointer;transition:all var(--t);border:1px solid transparent;
}
.chat-pill:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Composer (shared between dashboard + chat page) */
.chat-composer-wrap{position:relative}
.chat-composer{
  display:flex;flex-direction:column;
  background:var(--bg);border:1px solid var(--border);
  border-radius:16px;padding:0;box-shadow:0 2px 8px rgba(0,0,0,0.04);
  transition:border-color var(--t),box-shadow var(--t);overflow:hidden;
}
.chat-composer:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(35,131,226,0.1),0 2px 16px rgba(0,0,0,0.04)}
[data-theme="dark"] .chat-composer:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(82,156,219,0.15)}
.chat-textarea{
  flex:1;resize:none;font-size:16px;line-height:1.6;
  max-height:160px;min-height:28px;padding:16px 20px 8px;border:none;background:transparent;
}
.chat-textarea:focus{box-shadow:none}
.chat-textarea::placeholder{color:var(--fg-tertiary);font-size:16px}
.chat-toolbar{
  display:flex;align-items:center;padding:6px 12px 10px;gap:4px;
}
.chat-toolbar-left{display:flex;align-items:center;gap:4px}
.chat-toolbar-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.chat-attach-btn{
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--fg-tertiary);transition:background var(--t),color var(--t);
}
.chat-attach-btn:hover{background:var(--bg-hover);color:var(--fg-secondary)}
.chat-model-tag{
  font-size:13px;color:var(--fg-secondary);padding:4px 10px;
  border-radius:6px;cursor:pointer;transition:background var(--t);
  display:flex;align-items:center;gap:4px;
}
.chat-model-tag:hover{background:var(--bg-hover)}
.chat-model-tag svg{width:12px;height:12px;opacity:0.5}
.chat-send-btn{
  width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all var(--t);
}
.chat-send-btn:disabled{opacity:0.2;cursor:default}
.chat-send-btn:not(:disabled):hover{background:#1a73d4;transform:scale(1.05)}
.chat-model-dropdown{
  position:absolute;bottom:100%;right:0;margin-bottom:8px;
  background:var(--bg);border-radius:10px;
  box-shadow:0 0 0 1px rgba(0,0,0,0.04),0 8px 30px rgba(0,0,0,0.08);
  min-width:200px;max-height:280px;
  overflow-y:auto;z-index:50;display:none;padding:6px;
}
[data-theme="dark"] .chat-model-dropdown{box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 8px 30px rgba(0,0,0,0.3)}
.chat-model-dropdown.open{display:block}
.chat-model-opt{
  padding:8px 12px;border-radius:6px;font-size:14px;
  color:var(--fg-secondary);cursor:pointer;transition:background var(--t);
}
.chat-model-opt:hover{background:var(--bg-hover);color:var(--fg)}
.chat-model-opt.active{background:var(--accent-bg);color:var(--accent);font-weight:500}

/* ── Chat page #/chat/:id ── */
.page-chat{display:flex;flex-direction:column;height:100%;animation:fadeIn 150ms ease}
.chat-messages{flex:1;overflow-y:auto;padding:16px 0}
.chat-messages-inner{max-width:860px;margin:0 auto;padding:0 20px}
.chat-msg{display:flex;gap:8px;margin-bottom:14px;animation:fadeIn 150ms ease}
.chat-msg.user{justify-content:flex-end}
.chat-msg.assistant{justify-content:flex-start}
.chat-msg-avatar{
  width:26px;height:26px;border-radius:7px;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
  background:var(--accent);color:#fff;
}
.chat-msg-body{
  max-width:80%;font-size:14.5px;line-height:1.7;color:var(--fg);
  word-break:break-word;
}
.chat-msg.user .chat-msg-body{
  background:var(--accent);color:#fff;border-radius:18px 4px 18px 18px;padding:8px 14px;
}
.chat-msg.user .chat-msg-body a{color:#fff;text-decoration-color:rgba(255,255,255,0.4)}
.chat-msg.assistant .chat-msg-body{
  background:var(--bg-hover);border-radius:4px 18px 18px 18px;padding:10px 14px;
}
.chat-msg-body p{margin:0.3em 0}
.chat-msg-body a{color:var(--accent);text-decoration:underline;text-decoration-color:rgba(35,131,226,0.3);text-underline-offset:2px}
.chat-msg-body code{font-family:var(--font-mono);font-size:0.85em;background:var(--bg-active);padding:1px 4px;border-radius:3px}
.chat-msg-body pre{background:var(--bg-sidebar);border-radius:4px;padding:12px 16px;margin:8px 0;overflow-x:auto;font-size:13px}
.chat-msg-body pre code{background:none;padding:0}
.chat-msg-body strong{font-weight:600}
.chat-typing-dots{display:flex;gap:4px;padding:4px 0}
.chat-typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--fg-tertiary);animation:dotPulse 1.4s infinite}
.chat-typing-dots span:nth-child(2){animation-delay:.2s}
.chat-typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

/* Chat bottom composer (fixed) */
.chat-bottom{
  border-top:1px solid var(--border);padding:12px 0 16px;background:var(--bg);
}
.chat-bottom-inner{max-width:860px;margin:0 auto;padding:0 20px}

/* Chat list page */
.page-chat-list{max-width:var(--content-w);margin:0 auto;padding:32px 48px 120px;animation:fadeIn 150ms ease}
.chat-list-heading{font-size:24px;font-weight:700;letter-spacing:-0.03em;margin-bottom:24px}
.chat-list-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:8px;cursor:pointer;transition:all var(--t);border:1px solid var(--border);margin-bottom:6px;
}
.chat-list-item:hover{background:var(--bg-hover);border-color:var(--accent);box-shadow:0 1px 4px rgba(35,131,226,0.06)}
.chat-list-item svg{width:18px;height:18px;color:var(--accent);opacity:0.5;flex-shrink:0}
.chat-list-item-info{flex:1;min-width:0}
.chat-list-item-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-list-item-date{font-size:12px;color:var(--fg-tertiary)}
.chat-list-item-del{
  width:28px;height:28px;border-radius:var(--radius);display:flex;
  align-items:center;justify-content:center;color:var(--fg-tertiary);
  transition:background var(--t),color var(--t);opacity:0;
}
.chat-list-item:hover .chat-list-item-del{opacity:1}
.chat-list-item-del:hover{background:var(--bg-hover);color:var(--red)}
.chat-list-empty{color:var(--fg-tertiary);font-size:14px;padding:40px 0;text-align:center}

/* Section headers */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:12px}
.section-label{font-size:12px;font-weight:700;color:var(--fg-secondary);text-transform:uppercase;letter-spacing:0.05em}
.section-link{font-size:12px;color:var(--accent);transition:opacity var(--t);font-weight:500}
.section-link:hover{opacity:0.7}

/* Graph */
.graph-card{border-radius:10px;background:var(--bg-sidebar);overflow:hidden;margin-bottom:32px;border:1px solid var(--border)}
.graph-card canvas{display:block;width:100%;height:220px;cursor:grab}
.graph-card canvas:active{cursor:grabbing}
.graph-footer{display:flex;gap:12px;padding:6px 12px;font-size:11px;color:var(--fg-tertiary)}
.graph-footer-item{display:flex;align-items:center;gap:4px}
.graph-footer-dot{width:6px;height:6px;border-radius:50%}
.graph-empty-msg{height:220px;display:flex;align-items:center;justify-content:center;color:var(--fg-tertiary);font-size:13px}

/* Activity */
.activity-card{margin-bottom:32px}
.activity-row{
  display:flex;gap:10px;padding:7px 10px;font-size:14px;align-items:center;
  border-radius:var(--radius);transition:background var(--t);cursor:default;
}
.activity-row:hover{background:var(--bg-hover)}
.activity-icon{flex-shrink:0;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--accent-bg);color:var(--accent)}
.activity-icon svg{width:14px;height:14px}
.activity-date{font-size:12px;color:var(--fg-tertiary);min-width:42px}
.activity-label{color:var(--fg);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.activity-none{color:var(--fg-tertiary);font-size:14px;padding:12px 0}

/* Stats */
.stats-row{display:flex;gap:20px;font-size:13px;color:var(--fg-secondary);padding:12px 16px;border-radius:8px;background:var(--bg-sidebar);border:1px solid var(--border)}
.stats-row span{display:flex;align-items:center;gap:4px}
.stats-row span::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.5}

/* ── Page: Article ── */
.page-article{animation:fadeIn 150ms ease}
.page-article-inner{max-width:var(--content-w);margin:0 auto;padding:20px 48px 120px}

.article-title{
  font-family:var(--font-display);
  font-size:2.5em;font-weight:800;line-height:1.15;letter-spacing:-0.03em;
  margin-bottom:6px;outline:none;word-break:break-word;color:var(--fg);
}
.article-title:empty::before{content:"无标题";color:var(--fg-tertiary);font-weight:400}
.article-meta-line{font-size:13px;color:var(--fg-tertiary);margin-bottom:32px;display:flex;align-items:center;gap:8px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.article-meta-line a{color:var(--accent);text-decoration:none}
.article-meta-line a:hover{text-decoration:underline}

.article-body{
  outline:none;font-size:16.5px;line-height:1.8;min-height:300px;
  word-break:break-word;color:var(--fg);
  font-feature-settings:"kern" 1,"liga" 1;
  -webkit-font-smoothing:antialiased;
}
.article-body:focus{caret-color:var(--accent)}
.article-body h1{
  font-family:var(--font-display);
  font-size:1.875em;font-weight:800;margin:1.6em 0 0.4em;line-height:1.2;
  letter-spacing:-0.02em;color:var(--fg);
}
.article-body h2{
  font-family:var(--font-display);
  font-size:1.4em;font-weight:700;margin:1.8em 0 0.5em;line-height:1.25;
  letter-spacing:-0.01em;color:var(--fg);
  padding-bottom:8px;border-bottom:2px solid var(--accent);display:inline-block;
}
.article-body h3{
  font-family:var(--font-display);
  font-size:1.15em;font-weight:700;margin:1.5em 0 0.4em;line-height:1.3;
  color:var(--fg);padding-left:10px;border-left:3px solid var(--accent);
}
.article-body p{margin:0.6em 0;line-height:1.8}
.article-body a{color:var(--accent);text-decoration:underline;text-decoration-color:rgba(35,131,226,0.3);text-underline-offset:3px;transition:text-decoration-color var(--t)}
.article-body a:hover{text-decoration-color:var(--accent)}
.article-body strong{font-weight:700;color:var(--fg)}
.article-body em{font-style:italic}
.article-body blockquote{
  border-left:3px solid var(--accent);padding:8px 0 8px 20px;margin:16px 0;
  color:var(--fg-secondary);background:var(--accent-bg);border-radius:0 6px 6px 0;
}
.article-body ul,.article-body ol{padding-left:1.6em;margin:0.5em 0}
.article-body li{line-height:1.8;margin:3px 0;color:var(--fg)}
.article-body li::marker{color:var(--accent)}
.article-body code{
  font-family:var(--font-mono);font-size:0.85em;
  background:rgba(35,131,226,0.08);padding:2px 6px;border-radius:4px;
  color:var(--accent);font-weight:500;
}
.article-body pre{
  background:#1e1e2e;border-radius:8px;padding:18px 22px;
  margin:16px 0;overflow-x:auto;font-size:13.5px;line-height:1.6;
  border:1px solid rgba(0,0,0,0.1);
}
.article-body pre code{background:none;padding:0;color:#cdd6f4;font-weight:400}
.article-body hr{border:none;border-top:1px solid var(--border);margin:2em 0}
.article-body img{max-width:100%;border-radius:8px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.article-body .table-wrap{overflow-x:auto;margin:12px 0}
.article-body table{width:100%;border-collapse:collapse;font-size:14px;border-radius:6px;overflow:hidden}
.article-body th{font-weight:700;text-align:left;background:var(--accent-bg);color:var(--fg);font-size:13px;text-transform:uppercase;letter-spacing:0.03em}
.article-body th,.article-body td{padding:10px 14px;border:1px solid var(--border)}
.article-body td{color:var(--fg)}
.article-body tr:hover td{background:var(--bg-hover)}
[data-theme="dark"] .article-body pre{background:#1e1e2e;border-color:rgba(255,255,255,0.06)}
[data-theme="dark"] .article-body code{background:rgba(82,156,219,0.12);color:var(--accent)}

.article-save-indicator{
  position:fixed;bottom:20px;right:20px;font-size:12px;color:var(--fg-tertiary);
  background:var(--bg);padding:4px 10px;border-radius:var(--radius);
  box-shadow:0 1px 4px rgba(0,0,0,0.08);opacity:0;transition:opacity var(--t);z-index:10;
}
.article-save-indicator.show{opacity:1}

/* Related articles */
.article-related{
  margin-top:48px;padding-top:24px;border-top:1px solid var(--border);
}
.article-related-title{font-size:12px;font-weight:600;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px}
.article-related-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:6px;cursor:pointer;transition:all var(--t);font-size:14px;color:var(--fg-secondary);
  border:1px solid var(--border);margin-bottom:4px;
}
.article-related-item:hover{background:var(--accent-bg);color:var(--accent);border-color:rgba(35,131,226,0.15)}
.article-related-item svg{width:16px;height:16px;opacity:0.4;flex-shrink:0}

/* Floating format toolbar */
.format-toolbar{
  position:absolute;z-index:100;display:none;
  background:var(--accent);border-radius:8px;padding:4px;
  box-shadow:0 4px 20px rgba(35,131,226,0.3);
  gap:2px;align-items:center;
}
.format-toolbar.show{display:flex}
.format-toolbar-btn{
  width:28px;height:28px;border-radius:4px;display:flex;
  align-items:center;justify-content:center;color:#fff;
  transition:background 100ms;font-size:13px;font-weight:600;
}
.format-toolbar-btn:hover{background:rgba(255,255,255,0.2)}
.format-toolbar-sep{width:1px;height:18px;background:rgba(255,255,255,0.2);margin:0 2px}

/* Right-side TOC */
.article-toc{
  position:fixed;top:56px;right:16px;width:200px;
  max-height:calc(100vh - 80px);overflow-y:auto;
  font-size:12px;line-height:1.5;padding:8px 0;
}
.article-toc-title{font-size:11px;font-weight:600;color:var(--fg-tertiary);padding:0 8px 6px;text-transform:uppercase;letter-spacing:0.04em}
.article-toc-item{
  display:block;padding:3px 8px;border-radius:3px;
  color:var(--fg-tertiary);cursor:pointer;
  transition:color var(--t),background var(--t);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.article-toc-item:hover{color:var(--fg);background:var(--bg-hover)}
.article-toc-item.active{color:var(--fg)}
.article-toc-item.lvl2{padding-left:8px}
.article-toc-item.lvl3{padding-left:20px}
.article-toc-item.lvl4{padding-left:32px}
@media(max-width:1100px){.article-toc{display:none}}

/* ── Full Graph ── */
.page-graph{height:100%;display:flex;flex-direction:column;padding:12px 16px;animation:fadeIn 150ms ease}
.graph-toolbar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.graph-toolbar-btn{
  height:28px;padding:0 8px;border-radius:var(--radius);font-size:12px;
  color:var(--fg-secondary);border:1px solid var(--border);display:flex;align-items:center;gap:4px;
  transition:background var(--t);
}
.graph-toolbar-btn:hover{background:var(--bg-hover)}
.graph-toolbar-btn svg{width:14px;height:14px}
.graph-filter-label{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--fg-secondary);cursor:pointer}
.graph-filter-label input{cursor:pointer;accent-color:var(--accent)}
.graph-count{font-size:12px;color:var(--fg-tertiary);margin-left:auto}
.graph-canvas-wrap{flex:1;border-radius:6px;background:var(--bg-sidebar);overflow:hidden}
.graph-canvas-wrap canvas{display:block;width:100%;height:100%;cursor:grab}

/* ── Browse ── */
.page-browse{max-width:800px;margin:0 auto;padding:32px 48px 120px;animation:fadeIn 150ms ease}
.browse-heading{font-size:24px;font-weight:700;letter-spacing:-0.03em;margin-bottom:24px}
.browse-group{margin-bottom:6px}
.browse-group-head{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;
  transition:background var(--t);
}
.browse-group-head:hover{background:var(--bg-hover)}
.browse-group-head .arr{font-size:10px;color:var(--fg-tertiary);transition:transform var(--t)}
.browse-group.closed .arr{transform:rotate(-90deg)}
.browse-group.closed .browse-group-list{display:none}
.browse-group-count{font-size:12px;color:var(--fg-tertiary);font-weight:400;margin-left:auto}
.browse-group-list{list-style:none;padding:0 0 4px}
.browse-group-list a{
  display:flex;align-items:center;gap:6px;padding:4px 8px 4px 28px;
  border-radius:var(--radius);font-size:14px;color:var(--fg-secondary);
  transition:background var(--t);
}
.browse-group-list a:hover{background:var(--bg-hover);color:var(--fg)}
.browse-group-list a svg{width:16px;height:16px;opacity:0.4;flex-shrink:0}

/* ── Search ── */
.search-overlay{position:fixed;inset:0;z-index:200;display:none;background:rgba(15,15,15,0.6);justify-content:center;padding-top:12vh}
.search-overlay.open{display:flex}
.search-box{
  width:540px;max-width:92vw;background:var(--bg);border-radius:12px;
  box-shadow:0 0 0 1px var(--border),0 12px 48px rgba(0,0,0,0.15);max-height:440px;display:flex;flex-direction:column;overflow:hidden;
}
.search-input-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
.search-input-row svg{flex-shrink:0;color:var(--fg-tertiary);width:16px;height:16px}
.search-field{flex:1;font-size:16px;background:transparent}
.search-field::placeholder{color:var(--fg-tertiary)}
.search-hint{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);padding:2px 5px;background:var(--bg-hover);border-radius:3px}
.search-results{overflow-y:auto;flex:1}
.search-result{padding:10px 16px;cursor:pointer;transition:background 100ms;border-bottom:1px solid var(--border)}
.search-result:hover,.search-result.focused{background:var(--bg-hover)}
.search-result-title{font-size:14px;font-weight:500;margin-bottom:1px}
.search-result-path{font-size:12px;color:var(--fg-tertiary)}
.search-result-ctx{font-size:12px;color:var(--fg-secondary);margin-top:3px}
.search-result-ctx mark{background:var(--accent-bg);color:var(--accent);border-radius:2px;padding:0 2px}
.search-empty-msg{padding:32px;text-align:center;color:var(--fg-tertiary);font-size:13px}

/* ── Ingest (unified) ── */
.ingest-overlay{position:fixed;inset:0;z-index:200;display:none;background:rgba(15,15,15,0.4)}
.ingest-overlay.open{display:block}
.ingest-panel{
  position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100vh;
  background:var(--bg);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:201;transition:right 200ms ease;
  box-shadow:-2px 0 12px rgba(0,0,0,0.06);
}
.ingest-overlay.open .ingest-panel{right:0}
.ingest-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.ingest-head h3{font-size:15px;font-weight:600}
.ingest-form{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.field-label{font-size:12px;font-weight:500;color:var(--fg-secondary);margin-bottom:4px;display:block}

/* Drag zone */
.ingest-drop-zone{
  position:relative;border:2px dashed var(--border);border-radius:8px;
  min-height:200px;display:flex;flex-direction:column;
  transition:border-color 200ms,background 200ms;
}
.ingest-drop-zone.dragover{border-color:var(--accent);background:var(--accent-bg)}
.ingest-drop-zone textarea{
  width:100%;flex:1;resize:none;font-size:14px;line-height:1.6;
  padding:12px 14px;border:none;background:transparent;min-height:200px;
}
.ingest-drop-zone textarea::placeholder{color:var(--fg-tertiary)}
.ingest-drop-hint{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;pointer-events:none;
  color:var(--fg-tertiary);font-size:13px;opacity:0;transition:opacity 200ms;
}
.ingest-drop-zone.dragover .ingest-drop-hint{opacity:1}
.ingest-drop-zone.dragover textarea{opacity:0.1}
.ingest-drop-hint svg{width:32px;height:32px;opacity:0.4}

.field-input{
  width:100%;padding:8px 12px;font-size:14px;
  border:1px solid var(--border);border-radius:var(--radius);
  transition:border-color var(--t);
}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(35,131,226,0.08)}
.field-select{
  width:100%;padding:8px 12px;font-size:14px;
  border:1px solid var(--border);border-radius:var(--radius);
  appearance:none;-webkit-appearance:none;
  background:var(--bg) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2337352F' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 12px center;
  cursor:pointer;transition:border-color var(--t);
}
[data-theme="dark"] .field-select{
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round' opacity='0.5'/%3E%3C/svg%3E");
}
.field-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(35,131,226,0.08)}
.btn-fill{
  padding:10px 16px;border-radius:8px;background:var(--accent);
  color:#fff;font-size:14px;font-weight:600;width:100%;
  transition:all var(--t);
}
.btn-fill:hover{background:#1a73d4}
.btn-fill:disabled{opacity:0.3;cursor:not-allowed}

/* Ingest step progress */
.ingest-steps{display:flex;align-items:center;gap:0;padding:8px 0}
.ingest-step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-tertiary);flex:1}
.ingest-step-dot{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:10px;transition:all 200ms;
}
.ingest-step.active .ingest-step-dot{border-color:var(--accent);color:var(--accent);animation:stepPulse 1.5s infinite}
.ingest-step.done .ingest-step-dot{border-color:var(--green);background:var(--green);color:#fff}
.ingest-step-line{flex:1;height:2px;background:var(--border);margin:0 4px}
.ingest-step.done .ingest-step-line{background:var(--green)}
@keyframes stepPulse{0%,100%{opacity:1}50%{opacity:0.5}}

.ingest-result{
  padding:10px 12px;border-radius:var(--radius);font-size:13px;
  display:flex;align-items:center;gap:8px;cursor:pointer;
  transition:background var(--t);
}
.ingest-result:hover{background:var(--bg-hover)}
.ingest-result.done{background:rgba(68,131,97,0.06);color:var(--green)}
.ingest-result.error{background:rgba(235,87,87,0.06);color:var(--red)}

/* ── Settings ── */
.modal-bg{position:fixed;inset:0;z-index:300;display:none;background:rgba(15,15,15,0.6);justify-content:center;align-items:center}
.modal-bg.open{display:flex}
.modal-card{width:420px;max-width:92vw;background:var(--bg);border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.2);overflow:hidden}
.modal-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.modal-top h3{font-size:15px;font-weight:600}
.modal-top button{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--fg-tertiary);transition:background var(--t)}
.modal-top button:hover{background:var(--bg-hover)}
.modal-form{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--border)}
.btn-outline{padding:6px 14px;border-radius:var(--radius);font-size:13px;border:1px solid var(--border);color:var(--fg-secondary);transition:background var(--t)}
.btn-outline:hover{background:var(--bg-hover)}
.btn-sm-fill{padding:6px 14px;border-radius:var(--radius);font-size:13px;background:var(--fg);color:var(--bg);transition:opacity var(--t)}
.btn-sm-fill:hover{opacity:0.85}

/* ── Delete confirm ── */
.confirm-bg{position:fixed;inset:0;z-index:400;display:none;background:rgba(15,15,15,0.6);justify-content:center;align-items:center}
.confirm-bg.open{display:flex}
.confirm-card{width:340px;max-width:90vw;background:var(--bg);border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.2);padding:24px;text-align:center}
.confirm-card h3{font-size:15px;font-weight:600;margin-bottom:6px}
.confirm-card p{font-size:14px;color:var(--fg-secondary);margin-bottom:20px}
.confirm-btns{display:flex;gap:8px;justify-content:center}
.btn-cancel{padding:7px 20px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;color:var(--fg-secondary);transition:background var(--t)}
.btn-cancel:hover{background:var(--bg-hover)}
.btn-delete{padding:7px 20px;border-radius:var(--radius);background:var(--red);color:#fff;font-size:13px;font-weight:500;transition:opacity var(--t)}
.btn-delete:hover{opacity:0.85}

/* ── Toast (with undo support) ── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(50px);
  padding:8px 16px;border-radius:6px;background:var(--fg);color:var(--bg);
  font-size:13px;z-index:500;opacity:0;transition:transform 200ms ease,opacity 200ms ease;
  display:flex;align-items:center;gap:10px;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-undo{
  font-weight:600;cursor:pointer;padding:2px 8px;border-radius:var(--radius);
  transition:background 100ms;text-decoration:underline;
}
.toast-undo:hover{background:rgba(255,255,255,0.15)}

/* ── Mobile bottom nav ── */
.mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--bg);border-top:1px solid var(--border);
  padding:4px 0 env(safe-area-inset-bottom, 4px);z-index:100;
}
.mobile-nav-inner{display:flex;justify-content:space-around}
.mobile-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 12px;font-size:10px;color:var(--fg-tertiary);
  cursor:pointer;transition:color var(--t);position:relative;
}
.mobile-nav-item.active{color:var(--accent);font-weight:600}
.mobile-nav-item.active::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--accent);border-radius:1px}
.mobile-nav-item svg{width:20px;height:20px}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{display:none}
  .page-dashboard{padding:20px 16px 120px}
  .page-article-inner{padding:12px 16px 120px}
  .page-browse{padding:20px 16px 120px}
  .page-chat-list{padding:20px 16px 120px}
  .chat-messages-inner{padding:0 16px}
  .chat-bottom-inner{padding:0 16px}
  .mobile-nav{display:block}
  .content{padding-bottom:56px}
  .sidebar-expand-btn{display:none!important}
}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-resize" id="sidebarResize"></div>
  <div class="sidebar-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    知识库
    <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="收起侧边栏">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
    </button>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-item" data-view="dashboard" onclick="go('#/')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      首页
    </div>
    <div class="sidebar-item" data-view="chatlist" onclick="go('#/chat')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      对话
    </div>
    <div class="sidebar-item" data-view="graph" onclick="go('#/graph')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><circle cx="18" cy="6" r="3"/><line x1="8.5" y1="7.5" x2="15.5" y2="16.5"/><line x1="15.5" y1="7.5" x2="8.5" y2="16.5"/></svg>
      知识图谱
    </div>
    <div class="sidebar-item" data-view="browse" onclick="go('#/browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      全部文章
    </div>
  </nav>

  <!-- Chat history in sidebar -->
  <div class="sidebar-section">
    <span>对话</span>
    <button class="sidebar-section-btn" onclick="go('#/')" title="新对话">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div class="sidebar-chat-list" id="sidebarChats"></div>

  <div class="sidebar-section">
    <span>文章</span>
    <button class="sidebar-section-btn" onclick="newArticle()" title="新建文章">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div class="sidebar-pages" id="sidebarPages"></div>

  <div class="sidebar-bottom">
    <button class="sidebar-bottom-btn" onclick="openSettings()">

<script>
/* ── State ── */
let gd=null,td=null,sd=null,cv='',gaf=null,st=null,ipt=null;
let convId=null,msgs=[],chatBusy=false;
let artPath='',artMd='',saveT=null;
let sCache=null,chatList=null;
let searchIdx=-1;
let undoTimer=null,undoData=null;
const foldedTopics=new Set();

/* ── Helpers ── */
const $=id=>document.getElementById(id);
const h=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';
const hRe=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
async function api(p,o){const r=await fetch(p,o);if(!r.ok)throw new Error(''+r.status);return r.json()}
async function post(p,b){return api(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})}
async function put(p,b){return api(p,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})}
async function apiDel(p){return api(p,{method:'DELETE'})}
function toast(m,undoFn){
  const t=$('toast');
  t.innerHTML=h(m)+(undoFn?'<span class="toast-undo" id="toastUndo">撤销</span>':'');
  t.classList.add('show');
  if(undoFn){const btn=$('toastUndo');if(btn)btn.onclick=()=>{undoFn();t.classList.remove('show')}}
  clearTimeout(undoTimer);undoTimer=setTimeout(()=>t.classList.remove('show'),undoFn?6000:2500);
}
function go(hash){location.hash=hash}
function skelLines(n){let s='';for(let i=0;i<n;i++)s+='<div class="skel skel-line" style="width:'+((40+Math.random()*50)|0)+'%"></div>';return'<div class="skel skel-title"></div>'+s}

/* ── Theme ── */
function initTheme(){if(localStorage.getItem('kb-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');updThemeIcon()}
function toggleTheme(){
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  if(d){document.documentElement.removeAttribute('data-theme');localStorage.setItem('kb-theme','light')}
  else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('kb-theme','dark')}
  updThemeIcon();if(cv==='dashboard'||cv==='graph')render();
}
function updThemeIcon(){
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  $('themeIcon').innerHTML=d?'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>':'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}

/* ── Sidebar ── */
function toggleSidebar(){
  const sb=$('sidebar');sb.classList.toggle('collapsed');
  localStorage.setItem('kb-sidebar',sb.classList.contains('collapsed')?'collapsed':'');
}
function initSidebar(){if(localStorage.getItem('kb-sidebar')==='collapsed')$('sidebar').classList.add('collapsed')}

/* ── Router ── */
function route(){
  const hash=location.hash||'#/';
  if(hash==='#/'||hash==='#/dashboard')return{v:'dashboard'};
  if(hash==='#/chat')return{v:'chatlist'};
  if(hash.startsWith('#/chat/'))return{v:'chat',id:hash.slice(7)};
  if(hash==='#/graph')return{v:'graph'};
  if(hash==='#/browse')return{v:'browse'};
  if(hash.startsWith('#/article/'))return{v:'article',p:hash.slice(10)};
  return{v:'dashboard'};
}
function updNav(v){
  document.querySelectorAll('.sidebar-item[data-view]').forEach(el=>{
    el.classList.toggle('active',el.dataset.view===v||(v==='article'&&el.dataset.view==='browse')||(v==='chat'&&el.dataset.view==='chatlist'));
  });
  document.querySelectorAll('.mobile-nav-item[data-view]').forEach(el=>{
    el.classList.toggle('active',el.dataset.view===v||(v==='article'&&el.dataset.view==='browse')||(v==='chat'&&el.dataset.view==='chatlist'));
  });
}
function updBC(r){
  const bc=$('breadcrumb');
  if(r.v==='dashboard')bc.innerHTML='';
  else if(r.v==='chatlist')bc.innerHTML='<a href="#/">知识库</a><span class="sep">/</span>对话';
  else if(r.v==='chat')bc.innerHTML='<a href="#/">知识库</a><span class="sep">/</span><a href="#/chat">对话</a>';
  else if(r.v==='graph')bc.innerHTML='<a href="#/">知识库</a><span class="sep">/</span>知识图谱';
  else if(r.v==='browse')bc.innerHTML='<a href="#/">知识库</a><span class="sep">/</span>全部文章';
  else if(r.v==='article'&&r.p){
    const pts=r.p.split('/'),topic=pts.length>1?pts[0]:'',f=pts[pts.length-1].replace('.md','');
    let s='<a href="#/">知识库</a>';
    if(topic)s+='<span class="sep">/</span><a href="#/browse">'+h(topic)+'</a>';
    s+='<span class="sep">/</span>'+h(f);bc.innerHTML=s;
  }
}
function cancelGA(){if(gaf){cancelAnimationFrame(gaf);gaf=null}}
async function render(){
  const r=route();cv=r.v;updNav(r.v);updBC(r);cancelGA();hideFormatToolbar();
  const delBtn=document.getElementById('topbarDel');if(delBtn&&r.v!=='article')delBtn.remove();
  updSidebarPages();updSidebarChats();
  const c=$('content');c.scrollTop=0;
  if(r.v==='dashboard')await rDash(c);
  else if(r.v==='chatlist')await rChatList(c);
  else if(r.v==='chat')await rChat(c,r.id);
  else if(r.v==='graph')await rGraph(c);
  else if(r.v==='browse')await rBrowse(c);
  else if(r.v==='article')await rArticle(c,r.p);
  updSidebarPages();
}
window.addEventListener('hashchange',render);

/* ── Sidebar pages ── */
async function updSidebarPages(){
  const sp=$('sidebarPages');if(!sp)return;
  try{
    const tree=td||await api('/api/wiki/tree');td=tree;
    let s='';
    (tree||[]).forEach(t=>{
      const folded=foldedTopics.has(t.name)?'folded':'';
      s+='<div class="sidebar-topic '+folded+'" onclick="toggleFold(this,\''+h(t.name)+'\')" title="'+h(t.name)+'"><span class="fold-arrow">▾</span> '+h(t.name)+'</div>';
      t.children.forEach(c=>{
        const active=artPath===c.path?' active':'';
        const display=folded?' style="display:none"':'';
        s+='<div class="sidebar-page'+active+'" data-topic="'+h(t.name)+'"'+display+' onclick="go(\'#/article/'+h(c.path)+'\')" title="'+h(c.title||c.file)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="page-title">'+h(c.title||c.file)+'</span></div>';
      });
    });
    sp.innerHTML=s;
  }catch{}
}
function toggleFold(el,topic){
  el.classList.toggle('folded');
  if(foldedTopics.has(topic))foldedTopics.delete(topic);else foldedTopics.add(topic);
  const folded=el.classList.contains('folded');
  const pages=el.parentElement.querySelectorAll('.sidebar-page[data-topic="'+topic+'"]');
  pages.forEach(p=>p.style.display=folded?'none':'');
}

/* ── Sidebar chats ── */
async function updSidebarChats(){
  const sc=$('sidebarChats');if(!sc)return;
  try{
    const list=chatList||await api('/api/chat/list');chatList=list;
    const items=(list||[]).slice(0,5);
    if(!items.length){sc.innerHTML='';return}
    let s='';
    items.forEach(c=>{
      const active=(cv==='chat'&&convId===c.id)?' active':'';
      s+='<div class="sidebar-chat-item'+active+'" onclick="go(\'#/chat/'+h(c.id)+'\')" title="'+h(c.title)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span class="chat-title">'+h(c.title)+'</span></div>';
    });
    sc.innerHTML=s;
  }catch{sc.innerHTML=''}
}

/* ── Dashboard ── */
async function rDash(c){
  c.innerHTML='<div class="page-dashboard">'+skelLines(4)+'</div>';
  try{
    const[stats,graph,recent]=await Promise.all([api('/api/wiki/stats'),api('/api/wiki/graph'),api('/api/wiki/recent')]);
    sd=stats;gd=graph;
    let s='<div class="page-dashboard">';

    // Chat greeting + composer
    s+='<div class="chat-area">';
    s+='<div class="chat-greeting">基于知识库提问</div>';
    s+='<div class="chat-sub">输入问题，AI 会结合你的知识库回答</div>';
    s+='<div class="chat-pills"><span class="chat-pill" onclick="dashAsk(this)">知识库里有什么？</span><span class="chat-pill" onclick="dashAsk(this)">总结最近内容</span><span class="chat-pill" onclick="dashAsk(this)">有哪些主题？</span></div>';
    s+=buildComposer('dash');
    s+='</div>';

    // Graph
    s+='<div class="section-head"><span class="section-label">知识图谱</span><a class="section-link" href="#/graph">查看全部 &rarr;</a></div>';
    s+='<div class="graph-card" id="dgWrap">';
    if(graph.nodes.length<2)s+='<div class="graph-empty-msg">投喂更多知识，图谱会生长</div>';
    else s+='<canvas id="dgCanvas"></canvas>';
    s+='<div class="graph-footer" id="dgLegend"></div></div>';

    // Recent
    const ent=recent.entries||[];
    s+='<div class="section-head"><span class="section-label">最近活动</span></div>';
    s+='<div class="activity-card">';
    if(!ent.length)s+='<div class="activity-none">暂无记录，投喂知识开始使用</div>';
    else ent.slice(0,6).forEach(a=>{
      const icon=a.type==='ingest'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>':a.type==='query'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
      s+='<div class="activity-row"><span class="activity-icon">'+icon+'</span><span class="activity-date">'+(a.date||'').slice(5)+'</span><span class="activity-label">'+h(a.title)+'</span></div>';
    });
    s+='</div>';

    // Stats
    s+='<div class="stats-row"><span>'+stats.articles+' 篇文章</span><span>'+stats.sources+' 个来源</span><span>'+stats.topics+' 个主题</span>';
    if(stats.lastUpdate)s+='<span>更新于 '+stats.lastUpdate.slice(5)+'</span>';
    s+='</div></div>';
    c.innerHTML=s;
    initComposer('dash');
    if(graph.nodes.length>=2)requestAnimationFrame(()=>{const cv=document.getElementById('dgCanvas');if(cv)initFG(cv,graph,false)});
  }catch(e){c.innerHTML='<div style="text-align:center;padding:60px;color:var(--fg-tertiary)">加载失败: '+h(e.message)+'</div>'}
}

/* ── Composer builder (shared) ── */
function buildComposer(ctx){
  let s='<div class="chat-composer-wrap"><div class="chat-composer">';
  s+='<textarea class="chat-textarea" id="'+ctx+'In" placeholder="输入问题..." rows="1"></textarea>';
  s+='<div class="chat-toolbar"><div class="chat-toolbar-left">';

function renderMsg(m){
  const isUser=m.role==='user';
  const body=isUser?h(m.content).replace(/\n/g,'<br>'):fmtChat(m.content);
  let s='<div class="chat-msg '+m.role+'">';
  if(isUser){
    s+='<div class="chat-msg-body">'+body+'</div>';
  }else{
    s+='<div class="chat-msg-avatar">AI</div><div class="chat-msg-body">'+body+'</div>';
  }
  s+='</div>';
  return s;
}
function fmtChat(t){
  if(!t)return'';
  let s=t;
  s=s.replace(/```[\s\S]*?```/g,m=>{const c=m.replace(/```\w*\n?/,'').replace(/\n?```$/,'');return'<pre><code>'+h(c)+'</code></pre>'});
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,l,u)=>{
    if(/^https?:/.test(u))return'<a href="'+h(u)+'" target="_blank">'+h(l)+'</a>';
    if(u.endsWith('.md')){const p=u.replace(/^(\.\.\/)+/,'');return'<a href="#/article/'+h(p)+'">'+h(l)+'</a>'}
    return'<a href="'+h(u)+'">'+h(l)+'</a>';
  });
  s=s.replace(/\n/g,'<br>');
  return s;
}

/* ── Article ── */
async function rArticle(c,p){
  c.innerHTML='<div class="page-article"><div class="page-article-inner">'+skelLines(8)+'</div></div>';
  artPath=p;
  try{
    const res=await api('/api/wiki/article?path='+encodeURIComponent(p));
    artMd=res.content||'';
    const lines=artMd.split('\n');
    let title='',bodyStart=0;
    if(lines[0]&&lines[0].startsWith('#')){title=lines[0].replace(/^#+\s*/,'');bodyStart=1;while(bodyStart<lines.length&&!lines[bodyStart].trim())bodyStart++}
    const bodyLines=lines.slice(bodyStart);
    const cleanLines=[];let skipMeta=true;
    for(const line of bodyLines){
      if(skipMeta){
        const trimmed=line.trim();
        if(!trimmed)continue;
        if(/^\d+\s*(字|个来源|个引用)/.test(trimmed))continue;
        if(/^(创建|更新|Created|Updated|Published)\s*[:：]/.test(trimmed))continue;
        if(/^\d+\s*字\s*·/.test(trimmed))continue;
        if(/^>\s*(来源|原文|Source|Raw)[：:]/.test(trimmed)){cleanLines.push(line);continue}
        if(/^#{1,4}\s/.test(trimmed)||(!trimmed.startsWith('>')&&trimmed.length>0)){skipMeta=false;cleanLines.push(line);continue}
        continue;
      }
      cleanLines.push(line);
    }
    const bodyMd=cleanLines.join('\n');
    const rendered=renderMd(bodyMd,p);

    let s='<div class="page-article"><div class="page-article-inner">';
    s+='<div class="article-title" contenteditable="true" id="artTitle" oninput="onArtChange()">'+h(title)+'</div>';
    s+='<div class="article-body" contenteditable="true" id="artBody" oninput="onArtChange()">'+rendered+'</div>';
    // Related articles
    s+=await buildRelated(p);
    s+='</div></div>';
    s+=buildArticleTOC(artMd);
    s+='<div class="article-save-indicator" id="saveInd"></div>';
    c.innerHTML=s;

    const topActs=$('topbarActions');
    if(topActs&&!document.getElementById('topbarDel')){
      const delBtn=document.createElement('button');
      delBtn.id='topbarDel';delBtn.className='topbar-btn';delBtn.style.color='var(--fg-tertiary)';
      delBtn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>';
      delBtn.title='删除文章';delBtn.onclick=showDel;
      topActs.insertBefore(delBtn,topActs.firstChild);
    }

    // Setup format toolbar for article body
    setupFormatToolbar();
  }catch(e){c.innerHTML='<div style="text-align:center;padding:60px;color:var(--fg-tertiary)">加载失败: '+h(e.message)+'</div>'}
}

async function buildRelated(curPath){
  try{
    const tree=td||await api('/api/wiki/tree');td=tree;
    const parts=curPath.split('/');if(parts.length<2)return'';
    const topic=parts[0];
    const topicNode=(tree||[]).find(t=>t.name===topic);
    if(!topicNode)return'';
    const siblings=topicNode.children.filter(c=>c.path!==curPath);
    if(!siblings.length)return'';
    let s='<div class="article-related"><div class="article-related-title">同主题文章</div>';
    siblings.forEach(c=>{
      s+='<div class="article-related-item" onclick="go(\'#/article/'+h(c.path)+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+h(c.title||c.file)+'</div>';
    });
    s+='</div>';return s;
  }catch{return''}
}

function buildArticleTOC(md){
  const headings=[];const lines=md.split('\n');let inCode=false;
  for(const line of lines){
    if(line.trimStart().startsWith('```')){inCode=!inCode;continue}
    if(inCode)continue;
    const m=line.match(/^(#{1,4})\s+(.+)/);
    if(m&&m[1].length>1)headings.push({level:m[1].length,text:m[2].trim()});
  }
  if(headings.length<2)return'';
  let s='<div class="article-toc" id="articleToc"><div class="article-toc-title">目录</div>';
  headings.forEach(heading=>{
    const cls='article-toc-item lvl'+heading.level;
    const id=heading.text.replace(/[^\w\u4e00-\u9fff]+/g,'-').replace(/^-|-$/g,'');
    s+='<div class="'+cls+'" onclick="scrollToH(\''+h(id)+'\')">'+h(heading.text)+'</div>';
  });
  s+='</div>';return s;
}
function scrollToH(id){
  const body=$('artBody');if(!body)return;
  for(const el of body.querySelectorAll('h1,h2,h3,h4')){
    if(el.textContent.trim().replace(/[^\w\u4e00-\u9fff]+/g,'-').replace(/^-|-$/g,'')===id){
      el.scrollIntoView({behavior:'smooth',block:'start'});break;
    }
  }
}

/* ── HTML to Markdown ── */
function html2md(html){const div=document.createElement('div');div.innerHTML=html;return node2md(div).trim()}
function node2md(node){
  let md='';
  for(const child of node.childNodes){
    if(child.nodeType===3){md+=child.textContent;continue}
    if(child.nodeType!==1)continue;
    const tag=child.tagName;
    if(tag==='BR'){md+='\n';continue}
    if(tag==='P'){md+='\n\n'+node2md(child);continue}
    if(tag==='DIV'){md+='\n'+node2md(child);continue}
    if(/^H[1-6]$/.test(tag)){const lvl=tag[1];md+='\n\n'+'#'.repeat(+lvl)+' '+child.innerText;continue}
    if(tag==='STRONG'||tag==='B'){md+='**'+node2md(child)+'**';continue}
    if(tag==='EM'||tag==='I'){md+='*'+node2md(child)+'*';continue}
    if(tag==='CODE'){if(child.parentElement&&child.parentElement.tagName==='PRE')continue;md+='`'+child.textContent+'`';continue}
    if(tag==='PRE'){const code=child.querySelector('code');md+='\n\n```\n'+(code?code.textContent:child.textContent)+'\n```';continue}
    if(tag==='A'){const href=child.getAttribute('href')||'';md+='['+child.innerText+']('+href+')';continue}
    if(tag==='IMG'){md+='!['+child.alt+']('+child.src+')';continue}
    if(tag==='BLOCKQUOTE'){const lines=node2md(child).split('\n');md+='\n\n'+lines.map(l=>'> '+l).join('\n');continue}
    if(tag==='UL'){for(const li of child.children){if(li.tagName==='LI')md+='\n- '+node2md(li)}md+='\n';continue}
    if(tag==='OL'){let n=1;for(const li of child.children){if(li.tagName==='LI'){md+='\n'+n+'. '+node2md(li);n++}}md+='\n';continue}
    if(tag==='HR'){md+='\n\n---';continue}
    if(tag==='TABLE'){md+='\n\n'+table2md(child);continue}
    md+=node2md(child);
  }
  return md;
}
function table2md(table){
  const rows=[];table.querySelectorAll('tr').forEach(tr=>{
    const cells=[];tr.querySelectorAll('th,td').forEach(c=>cells.push(c.innerText.trim()));rows.push(cells);
  });
  if(!rows.length)return'';
  let md='| '+rows[0].join(' | ')+' |\n| '+rows[0].map(()=>'---').join(' | ')+' |';
  for(let i=1;i<rows.length;i++)md+='\n| '+rows[i].join(' | ')+' |';
  return md;
}

/* ── Markdown Renderer ── */
function renderMd(md,ap){
  const lines=md.split('\n');let html='',inCode=false,cLines=[];
  let inList=false,lt='',inBq=false,bqL=[],inTbl=false,tRows=[];
  const aDir=ap?ap.split('/').slice(0,-1).join('/'):'';
  function resLink(href){
    if(/^https?:\/\//.test(href))return href;
    if(!href.endsWith('.md'))return href;
    let r=href;
    if(href.startsWith('../')||href.startsWith('./')){
      const b=aDir?aDir.split('/'):[];const p=href.split('/');const c=[...b];
      for(const x of p){if(x==='..')c.pop();else if(x!=='.')c.push(x)}
      r=c.join('/');
    }else if(aDir&&!href.includes('/'))r=aDir+'/'+href;
    if(r.includes('raw/'))return href;
    return'#/article/'+r;
  }
  function inl(t){
    t=t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
    t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,l,u)=>{const r=resLink(u);const ext=/^https?:/.test(r);return'<a href="'+h(r)+'"'+(ext?' target="_blank"':'')+'>'+h(l)+'</a>'});
    t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    t=t.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>');
    t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
    return t;
  }
  function fBq(){if(bqL.length){html+='<blockquote>'+bqL.map(l=>'<p>'+inl(l)+'</p>').join('')+'</blockquote>';bqL=[]}inBq=false}
  function fTbl(){if(tRows.length>=2){html+='<div class="table-wrap"><table><thead><tr>'+tRows[0].map(c=>'<th>'+inl(c.trim())+'</th>').join('')+'</tr></thead><tbody>';for(let i=2;i<tRows.length;i++)html+='<tr>'+tRows[i].map(c=>'<td>'+inl(c.trim())+'</td>').join('')+'</tr>';html+='</tbody></table></div>'}tRows=[];inTbl=false}
  function fList(){if(inList){html+=lt==='ol'?'</ol>':'</ul>';inList=false}}

  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(line.trimStart().startsWith('```')){
      if(inCode){html+='<pre><code>'+h(cLines.join('\n'))+'</code></pre>';inCode=false;cLines=[];continue}
      else{fBq();fTbl();fList();inCode=true;continue}
    }
    if(inCode){cLines.push(line);continue}
    if(/^\|(.+)\|$/.test(line.trim())){fBq();fList();tRows.push(line.trim().slice(1,-1).split('|'));inTbl=true;continue}
    else if(inTbl)fTbl();
    if(/^>\s?/.test(line)){fList();fTbl();bqL.push(line.replace(/^>\s?/,''));inBq=true;continue}
    else if(inBq)fBq();
    const hm=line.match(/^(#{1,4})\s+(.+)/);
    if(hm){fList();fTbl();fBq();html+='<h'+hm[1].length+'>'+inl(hm[2].trim())+'</h'+hm[1].length+'>';continue}
    if(/^---+$/.test(line.trim())){fList();fTbl();fBq();html+='<hr>';continue}
    if(/^\s*[-*+]\s+/.test(line)){fTbl();fBq();if(!inList||lt!=='ul'){fList();html+='<ul>';inList=true;lt='ul'}html+='<li>'+inl(line.replace(/^\s*[-*+]\s+/,''))+'</li>';continue}
    if(/^\s*\d+\.\s+/.test(line)){fTbl();fBq();if(!inList||lt!=='ol'){fList();html+='<ol>';inList=true;lt='ol'}html+='<li>'+inl(line.replace(/^\s*\d+\.\s+/,''))+'</li>';continue}
    if(inList&&!line.trim())fList();
    if(!line.trim())continue;
    fList();fTbl();fBq();
    html+='<p>'+inl(line)+'</p>';
  }
  if(inCode)html+='<pre><code>'+h(cLines.join('\n'))+'</code></pre>';
  fList();fTbl();fBq();
  return html;
}

/* ── Force Graph ── */
const TC=['#3b82f6','#ef4444','#22c55e','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#14b8a6','#6366f1'];
let gs=null;
function initFG(canvas,data,full){
  cancelGA();const ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=(full?rect.height:220)*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=(full?rect.height:220)+'px';
  ctx.scale(dpr,dpr);const W=rect.width,H=full?rect.height:220;
  const topics=[...new Set(data.nodes.map(n=>n.topic).filter(Boolean))];
  const tcm={};topics.forEach((t,i)=>tcm[t]=TC[i%TC.length]);
  if(!full){const lg=document.getElementById('dgLegend');if(lg)lg.innerHTML=topics.map(t=>'<span class="graph-footer-item"><span class="graph-footer-dot" style="background:'+tcm[t]+'"></span>'+h(t)+'</span>').join('')}
  const cc={};data.nodes.forEach(n=>cc[n.id]=0);data.edges.forEach(e=>{cc[e.source]=(cc[e.source]||0)+1;cc[e.target]=(cc[e.target]||0)+1});
  const nodes=data.nodes.map((n,i)=>{const a=(i/data.nodes.length)*Math.PI*2;const r=Math.min(W,H)*0.3;return{...n,x:W/2+Math.cos(a)*r*(0.5+Math.random()*0.5),y:H/2+Math.sin(a)*r*(0.5+Math.random()*0.5),vx:0,vy:0,radius:Math.max(4,Math.min(14,4+(cc[n.id]||0)*2)),color:tcm[n.topic]||'#94a3b8'}});
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  const edges=data.edges.filter(e=>nm[e.source]&&nm[e.target]).map(e=>({source:nm[e.source],target:nm[e.target]}));
  let zoom=1,px=0,py=0,hov=null,drag=null,dsx=0,dsy=0,pan=false,psx=0,psy=0,pox=0,poy=0,fc=0,settled=false;
  gs={zoom,px,py,nodes,edges,canvas,full,data,tcm};
  function s2w(sx,sy){return{x:(sx-px)/zoom,y:(sy-py)/zoom}}
  function sim(){
    if(settled)return;const al=Math.max(0.01,1-fc/250);
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;const f=800/(d*d)*al;a.vx-=dx/d*f;a.vy-=dy/d*f;b.vx+=dx/d*f;b.vy+=dy/d*f}
    for(const e of edges){const dx=e.target.x-e.source.x,dy=e.target.y-e.source.y,d=Math.sqrt(dx*dx+dy*dy)||1;const f=(d-80)*0.02*al;e.source.vx+=dx/d*f;e.source.vy+=dy/d*f;e.target.vx-=dx/d*f;e.target.vy-=dy/d*f}
    let mv=0;for(const n of nodes){n.vx+=(W/2-n.x)*0.01*al;n.vy+=(H/2-n.y)*0.01*al;if(n===drag)continue;n.vx*=0.85;n.vy*=0.85;n.x+=n.vx;n.y+=n.vy;n.x=Math.max(n.radius+10,Math.min(W-n.radius-10,n.x));n.y=Math.max(n.radius+10,Math.min(H-n.radius-10,n.y));mv+=Math.abs(n.vx)+Math.abs(n.vy)}
    fc++;if(fc>250||mv<0.1)settled=true;
  }
  function draw(){
    const dk=document.documentElement.getAttribute('data-theme')==='dark';
    ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(px,py);ctx.scale(zoom,zoom);
    for(const e of edges){ctx.beginPath();ctx.moveTo(e.source.x,e.source.y);ctx.lineTo(e.target.x,e.target.y);const hl=hov&&(e.source===hov||e.target===hov);ctx.strokeStyle=hl?(dk?'rgba(255,255,255,0.3)':'rgba(55,53,47,0.2)'):(dk?'rgba(255,255,255,0.05)':'rgba(55,53,47,0.06)');ctx.lineWidth=hl?1.5:1;ctx.stroke()}
    for(const n of nodes){const isH=n===hov;const isC=hov&&edges.some(e=>(e.source===hov&&e.target===n)||(e.target===hov&&e.source===n));const dim=hov&&!isH&&!isC;ctx.beginPath();ctx.arc(n.x,n.y,n.radius,0,Math.PI*2);ctx.fillStyle=dim?(dk?'rgba(255,255,255,0.06)':'rgba(55,53,47,0.06)'):n.color;ctx.globalAlpha=dim?0.25:1;ctx.fill();ctx.globalAlpha=1;if(isH){ctx.strokeStyle=dk?'#fff':'#37352F';ctx.lineWidth=2;ctx.stroke()}}
    if(hov){const text=hov.name||hov.label||hov.id;ctx.font='12px '+getComputedStyle(document.body).fontFamily;const tw=ctx.measureText(text).width;const tx=hov.x-tw/2,ty=hov.y-hov.radius-14;ctx.fillStyle=dk?'rgba(0,0,0,0.8)':'rgba(0,0,0,0.75)';ctx.beginPath();ctx.roundRect(tx-4,ty-14,tw+8,20,4);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(text,tx,ty)}
    ctx.restore();
  }
  function loop(){sim();draw();if(!settled||hov||drag)gaf=requestAnimationFrame(loop)}
  canvas.onmousemove=e=>{const r=canvas.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;if(drag){const w=s2w(mx,my);drag.x=w.x;drag.y=w.y;drag.vx=0;drag.vy=0;draw();return}if(pan){px=pox+(mx-psx);py=poy+(my-psy);gs.px=px;gs.py=py;draw();return}const w=s2w(mx,my);let found=null;for(const n of nodes){const dx=w.x-n.x,dy=w.y-n.y;if(dx*dx+dy*dy<(n.radius+4)**2){found=n;break}}if(found!==hov){hov=found;canvas.style.cursor=found?'pointer':'grab';if(!settled)return;draw();if(found&&settled){settled=false;gaf=requestAnimationFrame(loop)}}};
  canvas.onmousedown=e=>{const r=canvas.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const w=s2w(mx,my);for(const n of nodes){const dx=w.x-n.x,dy=w.y-n.y;if(dx*dx+dy*dy<(n.radius+4)**2){drag=n;dsx=mx;dsy=my;canvas.style.cursor='grabbing';return}}pan=true;psx=mx;psy=my;pox=px;poy=py};
  canvas.onmouseup=e=>{if(drag){const r=canvas.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;if(Math.sqrt((mx-dsx)**2+(my-dsy)**2)<4)go('#/article/'+drag.id);drag=null;canvas.style.cursor=hov?'pointer':'grab'}if(pan){pan=false;canvas.style.cursor='grab'}};
  canvas.onmouseleave=()=>{hov=null;drag=null;pan=false;if(settled)draw()};
  canvas.onwheel=e=>{e.preventDefault();const r=canvas.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const d=e.deltaY>0?0.9:1.1;const nz=Math.max(0.3,Math.min(5,zoom*d));px=mx-(mx-px)*(nz/zoom);py=my-(my-py)*(nz/zoom);zoom=nz;gs.zoom=zoom;gs.px=px;gs.py=py;draw()};
  gaf=requestAnimationFrame(loop);
}
function gZoom(f){if(!gs)return;const c=gs.canvas;const r=c.getBoundingClientRect();const cx=r.width/2,cy=r.height/2;const nz=Math.max(0.3,Math.min(5,gs.zoom*f));gs.px=cx-(cx-gs.px)*(nz/gs.zoom);gs.py=cy-(cy-gs.py)*(nz/gs.zoom);gs.zoom=nz;cancelGA();const el=gs.full?document.getElementById('fgCanvas'):document.getElementById('dgCanvas');if(el)initFG(el,gs.data,gs.full)}
function applyGF(){if(!gs)return;const cbs=document.querySelectorAll('.graph-filter-label input');const en=new Set();cbs.forEach(cb=>{if(cb.checked)en.add(cb.dataset.topic)});const f={nodes:gs.data.nodes.filter(n=>!n.topic||en.has(n.topic)),edges:gs.data.edges.filter(e=>{const s=gs.data.nodes.find(n=>n.id===e.source);const t=gs.data.nodes.find(n=>n.id===e.target);return s&&t&&(!s.topic||en.has(s.topic))&&(!t.topic||en.has(t.topic))})};const ct=document.querySelector('.graph-count');if(ct)ct.textContent=f.nodes.length+' 节点';cancelGA();const cv=document.getElementById('fgCanvas');if(cv)initFG(cv,f,true)}

async function submitIngest(){
  const content=$('ingestContent').value.trim();
  if(!content){toast('请输入内容');return}
  const topic=$('ingestTopic').value;const model=$('ingestModel');
  // Auto-detect type
  const type=/^https?:\/\//.test(content)?'url':'text';

  const btn=$('ingestBtn');const steps=$('ingestSteps');const result=$('ingestResult');
  btn.disabled=true;steps.style.display='flex';result.style.display='none';
  setStep('fetch');

  try{
    const body={type,content,topic};
    if(model&&model.value){const p=model.value.split('|');if(p.length===2){body.provider=p[0];body.model=p[1]}}
    await fetch('/api/ingest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    setStep('parse');
    let pollCount=0;
    ipt=setInterval(async()=>{
      try{
        pollCount++;
        if(pollCount>3)setStep('compile');
        const s=await api('/api/ingest/status');
        if(s.status==='done'){
          clearInterval(ipt);ipt=null;setStep('done');
          btn.disabled=false;gd=null;td=null;sd=null;chatList=null;
          // Show result with link
          const artTitle=s.article?.title||'新文章';
          const artPath=s.article?.path||'';
          result.style.display='flex';result.className='ingest-result done';
          result.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 已创建: '+h(artTitle)+' →';
          result.onclick=()=>{closeIngest();if(artPath)go('#/article/'+artPath);else render()};
          toast('知识库已更新');
        }else if(s.status==='error'||s.status==='failed'){
          clearInterval(ipt);ipt=null;
          steps.querySelectorAll('.ingest-step').forEach(s=>s.classList.remove('active'));
          result.style.display='flex';result.className='ingest-result error';
          result.innerHTML='编译失败: '+(s.message||'未知错误');result.onclick=null;
          btn.disabled=false;
        }
      }catch{}
    },2000);
  }catch(e){
    steps.style.display='none';
    result.style.display='flex';result.className='ingest-result error';
    result.innerHTML='提交失败: '+h(e.message);result.onclick=null;
    btn.disabled=false;
  }
}
function setStep(name){
  const order=['fetch','parse','compile','done'];
  const idx=order.indexOf(name);
  $('ingestSteps').querySelectorAll('.ingest-step').forEach((el,i)=>{
    el.classList.remove('active','done');
    if(i<idx)el.classList.add('done');
    else if(i===idx)el.classList.add('active');
  });
}

async function saveSett(){
  const b={provider:$('sProv').value,model:$('sModel').value};const k=$('sKey').value;if(k)b.apiKey=k;
  try{await put('/api/settings',b);sCache=null;toast('已保存');closeSettings()}catch(e){toast('失败: '+e.message)}
}
async function testConn(){try{await saveSett();const r=await post('/api/settings/test',{});toast(r.ok?'连接成功':'失败: '+r.message)}catch(e){toast('测试失败')}}

/* ── Init ── */
(function(){
  const handle=$('sidebarResize'),sb=$('sidebar');
  if(!handle||!sb)return;
  let startX,startW;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();startX=e.clientX;startW=sb.offsetWidth;
    handle.classList.add('dragging');
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
  function onMove(e){const w=Math.max(180,Math.min(400,startW+(e.clientX-startX)));sb.style.width=w+'px'}
  function onUp(){handle.classList.remove('dragging');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)}
})();

// Close dropdowns on outside click
document.addEventListener('click',e=>{
  document.querySelectorAll('.chat-model-dropdown.open').forEach(dd=>{
    if(!dd.contains(e.target)&&!e.target.closest('.chat-model-tag'))dd.classList.remove('open');
  });
});

initTheme();
initSidebar();
render();
</script>
